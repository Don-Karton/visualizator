<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экран управления медиа</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>window.react = React;</script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React Icons -->
    <script src="https://unpkg.com/lucide-react"></script>
    <!-- QR Code Styling Library -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #52525b; }
        .checkerboard-bg {
          background-image: linear-gradient(45deg, #18181b 25%, transparent 25%),
                            linear-gradient(-45deg, #18181b 25%, transparent 25%),
                            linear-gradient(45deg, transparent 75%, #18181b 75%),
                            linear-gradient(-45deg, transparent 75%, #18181b 75%);
          background-size: 20px 20px;
          background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        kbd {
          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        /* Анимации для слайд-шоу */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideOutLeft { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes zoomOut { from { transform: scale(1); opacity: 1; } to { transform: scale(1.2); opacity: 0; } }

        /* Постоянные анимации показа */
        @keyframes kenBurns {
          0% { transform: scale(1) translate(0, 0); }
          50% { transform: scale(1.1) translate(-1%, -1%); }
          100% { transform: scale(1) translate(0, 0); }
        }
        @keyframes smoothRotate {
          0% { transform: rotate(0deg) scale(1); }
          50% { transform: rotate(2deg) scale(1.05); }
          100% { transform: rotate(0deg) scale(1); }
        }
        @keyframes floating {
          0% { transform: translateY(0) scale(1); }
          50% { transform: translateY(-10px) scale(1.02); }
          100% { transform: translateY(0) scale(1); }
        }

        .animate-ken-burns { animation: kenBurns 20s ease-in-out infinite; }
        .animate-smooth-rotate { animation: smoothRotate 15s ease-in-out infinite; }
        .animate-floating { animation: floating 10s ease-in-out infinite; }

        .animate-fade-in { animation: fadeIn var(--anim-duration, 0.5s) ease-out forwards; }
        .animate-fade-out { animation: fadeOut var(--anim-duration, 0.5s) ease-in forwards; }

        .animate-slide-in { animation: slideInRight var(--anim-duration, 0.5s) ease-out forwards; }
        .animate-slide-out { animation: slideOutLeft var(--anim-duration, 0.5s) ease-in forwards; }

        .animate-zoom-in { animation: zoomIn var(--anim-duration, 0.5s) ease-out forwards; }
        .animate-zoom-out { animation: zoomOut var(--anim-duration, 0.5s) ease-in forwards; }
    </style>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const {
          Settings, Play, Pause, SkipForward, Maximize, X,
          Upload, Trash2, Plus, Monitor, Image: ImageIcon,
          QrCode, Zap, AlertCircle, Save, Layers, Eye, EyeOff, GripVertical,
          Clock, ChevronLeft, ChevronRight, Download, List, Copy
        } = LucideReact;

        // --- IndexedDB для хранения медиафайлов ---
        const dbPromise = new Promise((resolve, reject) => {
          const request = indexedDB.open("VisualizerDB", 1);
          request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains("playlists")) {
              db.createObjectStore("playlists", { keyPath: "id" });
            }
          };
          request.onsuccess = (e) => resolve(e.target.result);
          request.onerror = (e) => reject(e.target.error);
        });

        const savePlaylistToDB = async (playlist) => {
          const db = await dbPromise;
          return new Promise((resolve, reject) => {
            const tx = db.transaction("playlists", "readwrite");
            const store = tx.objectStore("playlists");
            const request = store.put({ id: "current", media: playlist, timestamp: Date.now() });
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
          });
        };

        const loadPlaylistFromDB = async () => {
          const db = await dbPromise;
          return new Promise((resolve, reject) => {
            const tx = db.transaction("playlists", "readonly");
            const store = tx.objectStore("playlists");
            const req = store.get("current");
            req.onsuccess = () => resolve(req.result ? req.result.media : null);
            req.onerror = () => reject(req.error);
          });
        };

        // --- Компонент для рендера QR-кода ---
        const QRCodeCustom = ({ data, dotType, padding, bgRadius, size = 300 }) => {
          const qrRef = useRef(null);

          useEffect(() => {
            if (qrRef.current) {
              qrRef.current.innerHTML = '';
              const qrCode = new window.QRCodeStyling({
                width: size,
                height: size,
                data: data,
                margin: 0,
                qrOptions: { typeNumber: 0, mode: "Byte", errorCorrectionLevel: "Q" },
                dotsOptions: { type: dotType, color: "#000000" },
                backgroundOptions: { color: "transparent" },
                cornersSquareOptions: { type: dotType === 'rounded' || dotType === 'classy' ? 'extra-rounded' : 'square', color: "#000000" },
                cornersDotOptions: { type: dotType === 'rounded' || dotType === 'classy' ? 'dot' : 'square', color: "#000000" }
              });
              qrCode.append(qrRef.current);
            }
          }, [data, dotType, padding, bgRadius, size]);

          return (
            <div
              className="inline-block"
              style={{
                padding: `${padding}px`,
                borderRadius: `${bgRadius}px`,
                backgroundColor: '#ffffff',
                boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.5)'
              }}
            >
              <div ref={qrRef} />
            </div>
          );
        };

        function App() {
          // --- Состояния приложения ---
          const [settingsOpen, setSettingsOpen] = useState(true);
          const [activeTab, setActiveTab] = useState('media');

          // Инициализация из LocalStorage
          const loadSavedData = (key, defaultValue) => {
            try {
              const saved = localStorage.getItem(key);
              return saved ? JSON.parse(saved) : defaultValue;
            } catch (e) {
              return defaultValue;
            }
          };

          // Медиа
          const [mediaQueue, setMediaQueue] = useState([]);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [imageDuration, setImageDuration] = useState(() => loadSavedData('imageDuration', 5));
          const [isPlaying, setIsPlaying] = useState(true);

          // Анимации
          const [animationSettings, setAnimationSettings] = useState(() => loadSavedData('animationSettings', {
            type: 'fade', // fade, slide, zoom
            inDuration: 0.8,
            outDuration: 0.8,
            displayType: 'none' // none, ken-burns, smooth-rotate, floating
          }));
          const [animatingOut, setAnimatingOut] = useState(null);

          // Оверлеи (активные горячие клавиши)
          const [activeOverlays, setActiveOverlays] = useState({});

          // Логика авто-паузы при QR
          useEffect(() => {
            const isAnyQrActive = qrPresets.some(p => activeOverlays[p.key]);
            if (isAnyQrActive) {
              setIsPlaying(false);
            } else {
              setIsPlaying(true);
            }
          }, [activeOverlays, qrPresets]);

          // Логотип (Z)
          const [logoSettings, setLogoSettings] = useState(() => loadSavedData('logoSettings', {
            url: null,
            size: 30, // %
            opacity: 100 // %
          }));

          // Стробоскоп
          const [strobe, setStrobe] = useState(() => loadSavedData('strobe', {
            enabled: false,
            intensity: 0.8,
            speed: 100, // ms
            randomness: 0.5 // 0 to 1
          }));
          const strobeRef = useRef(null);

          // Эффекты (Canvas)
          const [effects, setEffects] = useState(() => loadSavedData('effectsSettings', {
            rgbGlitch: { enabled: false, intensity: 0.5, frequency: 0.2 },
            glitchGlow: { enabled: false, intensity: 0.6, color: '#ffffff', size: 50, frequency: 0.5 },
            glitchExposure: { enabled: false, intensity: 0.3, frequency: 0.3 },
            starrySky: { enabled: false, count: 100, size: 2, speed: 0.1, color: '#ffffff' }
          }));
          const canvasRef = useRef(null);

          // QR Пресеты
          const [qrPresets, setQrPresets] = useState(() => loadSavedData('qrPresets', [
            {
              id: 'default-a',
              key: 'a',
              name: 'Меню заведения (A)',
              type: 'url',
              url: 'https://example.com/menu',
              wifiSsid: '',
              wifiPass: '',
              bgRadius: 24,
              padding: 24,
              dotType: 'rounded',
              size: 300
            }
          ]));

          // Слои
          const [layers, setLayers] = useState(() => loadSavedData('layers', [
            { id: 'media', name: 'Медиаконтент', visible: true },
            { id: 'effects', name: 'Эффекты (Canvas)', visible: true },
            { id: 'strobe', name: 'Стробоскоп', visible: true },
            { id: 'qr', name: 'QR-коды', visible: true },
            { id: 'logo', name: 'Логотип', visible: true }
          ]));

          const moveLayer = (fromIndex, toIndex) => {
            const newLayers = [...layers];
            const [moved] = newLayers.splice(fromIndex, 1);
            newLayers.splice(toIndex, 0, moved);
            setLayers(newLayers);
          };

          const toggleLayerVisibility = (id) => {
            setLayers(prev => prev.map(l => l.id === id ? { ...l, visible: !l.visible } : l));
          };

          // Функция сохранения
          const saveAllData = () => {
            localStorage.setItem('qrPresets', JSON.stringify(qrPresets));
            localStorage.setItem('logoSettings', JSON.stringify(logoSettings));
            localStorage.setItem('imageDuration', JSON.stringify(imageDuration));
            localStorage.setItem('strobe', JSON.stringify(strobe));
            localStorage.setItem('layers', JSON.stringify(layers));
            localStorage.setItem('animationSettings', JSON.stringify(animationSettings));
            localStorage.setItem('effectsSettings', JSON.stringify(effects));

            // Визуальная индикация на кнопке сохранения
            const btn = document.getElementById('global-save-btn');
            if (btn) {
              const originalContent = btn.innerHTML;
              btn.innerHTML = '<span style="color: #4ade80;">✓</span>';
              setTimeout(() => {
                btn.innerHTML = originalContent;
              }, 2000);
            }
          };

          const fileInputRef = useRef(null);
          const logoInputRef = useRef(null);

          // --- Логика воспроизведения медиа ---
          const nextMedia = useCallback(() => {
            if (mediaQueue.length <= 1) {
              if (mediaQueue.length === 1) setCurrentIndex(0);
              return;
            }

            setAnimatingOut(currentIndex);

            setTimeout(() => {
              setCurrentIndex((prev) => (prev + 1) % mediaQueue.length);
              setAnimatingOut(null);
            }, animationSettings.outDuration * 1000);
          }, [mediaQueue.length, currentIndex, animationSettings.outDuration]);

          useEffect(() => {
            if (mediaQueue.length === 0 || !isPlaying) return;

            const currentMedia = mediaQueue[currentIndex];
            // Если текущий файл - изображение, запускаем таймер
            if (currentMedia && currentMedia.type.startsWith('image/')) {
              const duration = currentMedia.duration || imageDuration;
              const timer = setTimeout(nextMedia, duration * 1000);
              return () => clearTimeout(timer);
            }
            // Для видео переход происходит по событию onEnded на самом элементе
          }, [currentIndex, mediaQueue, imageDuration, isPlaying, nextMedia]);

          // --- Эффект Стробоскопа ---
          useEffect(() => {
            if (!strobe.enabled) {
              if (strobeRef.current) strobeRef.current.style.opacity = '0';
              return;
            }

            let timeoutId;
            const loop = () => {
              // Вероятность вспышки зависит от randomness (чем выше, тем хаотичнее пропуски)
              const shouldFlash = Math.random() > strobe.randomness * 0.8;

              if (shouldFlash && strobeRef.current) {
                strobeRef.current.style.opacity = strobe.intensity;
                // Длительность самой вспышки (короткая)
                setTimeout(() => {
                  if (strobeRef.current) strobeRef.current.style.opacity = '0';
                }, 30);
              }

              timeoutId = setTimeout(loop, strobe.speed);
            };

            loop();
            return () => clearTimeout(timeoutId);
          }, [strobe]);

          // --- Canvas Effects Loop ---
          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let animationFrameId;

            const resize = () => {
              canvas.width = window.innerWidth;
              canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resize);
            resize();

            let stars = [];
            const initStars = () => {
              stars = Array.from({ length: effects.starrySky.count }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * effects.starrySky.size,
                opacity: Math.random()
              }));
            };
            initStars();

            const render = (time) => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);

              // RGB Glitch
              if (effects.rgbGlitch.enabled && Math.random() < effects.rgbGlitch.frequency) {
                const offset = effects.rgbGlitch.intensity * 20;
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(Math.random() * offset - offset/2, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(Math.random() * offset - offset/2, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0000ff';
                ctx.fillRect(Math.random() * offset - offset/2, 0, canvas.width, canvas.height);
                ctx.restore();
              }

              // Glitch Exposure
              if (effects.glitchExposure.enabled && Math.random() < effects.glitchExposure.frequency) {
                const flicker = (Math.random() - 0.5) * effects.glitchExposure.intensity;
                ctx.fillStyle = flicker > 0 ? '#ffffff' : '#000000';
                ctx.globalAlpha = Math.abs(flicker);
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1.0;
              }

              // Glitch Glow
              if (effects.glitchGlow.enabled && Math.random() < effects.glitchGlow.frequency) {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                const gradient = ctx.createRadialGradient(
                  canvas.width/2, canvas.height/2, 0,
                  canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height) * (effects.glitchGlow.size / 100)
                );
                gradient.addColorStop(0, effects.glitchGlow.color);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.globalAlpha = effects.glitchGlow.intensity;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
              }

              // Starry Sky
              if (effects.starrySky.enabled) {
                if (stars.length !== effects.starrySky.count) initStars();
                ctx.fillStyle = effects.starrySky.color || '#ffffff';
                stars.forEach(star => {
                  star.opacity += (Math.random() - 0.5) * effects.starrySky.speed;
                  if (star.opacity < 0) star.opacity = 0;
                  if (star.opacity > 1) star.opacity = 1;
                  ctx.globalAlpha = star.opacity;
                  ctx.beginPath();
                  ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                  ctx.fill();
                });
                ctx.globalAlpha = 1.0;
              }

              animationFrameId = requestAnimationFrame(render);
            };

            animationFrameId = requestAnimationFrame(render);
            return () => {
              cancelAnimationFrame(animationFrameId);
              window.removeEventListener('resize', resize);
            };
          }, [effects]);

          // --- Горячие клавиши ---
          useEffect(() => {
            const handleKeyDown = (e) => {
              // Игнорируем ввод в текстовые поля, если они в фокусе
              if (document.activeElement.tagName === 'INPUT' ||
                  document.activeElement.tagName === 'TEXTAREA' ||
                  document.activeElement.tagName === 'SELECT') return;

              let key = e.key.toLowerCase();

              // Маппинг русских клавиш для горячих клавиш
              const RU_MAP = {
                'й': 'q', 'ц': 'w', 'у': 'e', 'к': 'r', 'е': 't', 'н': 'y', 'г': 'u', 'ш': 'i', 'щ': 'o', 'з': 'p',
                'ф': 'a', 'ы': 's', 'в': 'd', 'а': 'f', 'п': 'g', 'р': 'h', 'о': 'j', 'л': 'k', 'д': 'l',
                'я': 'z', 'ч': 'x', 'с': 'c', 'м': 'v', 'и': 'b', 'т': 'n', 'ь': 'm'
              };

              if (RU_MAP[key]) key = RU_MAP[key];

              if (key === 'q') {
                setSettingsOpen(prev => !prev);
              } else if (key === 'z') {
                setActiveOverlays(prev => ({ ...prev, 'z': !prev['z'] }));
              } else {
                // Проверка QR пресетов
                const preset = qrPresets.find(p => p.key.toLowerCase() === key);
                if (preset) {
                  setActiveOverlays(prev => ({ ...prev, [preset.key]: !prev[preset.key] }));
                }
              }
            };

            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [qrPresets]);

          // Переключение логотипа через ПКМ
          const handleContextMenu = (e) => {
            e.preventDefault();
            setActiveOverlays(prev => ({ ...prev, 'z': !prev['z'] }));
          };

          // --- Обработчики загрузки файлов ---
          const handleMediaUpload = (e) => {
            const files = Array.from(e.target.files);
            const newMedia = files.map(file => ({
              id: Math.random().toString(36).substr(2, 9),
              file,
              url: URL.createObjectURL(file),
              type: file.type,
              name: file.name,
              duration: imageDuration
            }));
            setMediaQueue(prev => [...prev, ...newMedia]);
          };

          const removeMedia = (id) => {
            setMediaQueue(prev => {
              const filtered = prev.filter(m => m.id !== id);
              if (currentIndex >= filtered.length) setCurrentIndex(Math.max(0, filtered.length - 1));
              return filtered;
            });
          };

          const handleLogoUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              setLogoSettings(prev => ({ ...prev, url: URL.createObjectURL(file) }));
            }
          };

          const toggleFullscreen = () => {
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
              document.exitFullscreen();
            }
          };

          // --- Генерация данных для QR ---
          const getQrData = (preset) => {
            if (preset.type === 'wifi') {
              return `WIFI:T:WPA;S:${preset.wifiSsid};P:${preset.wifiPass};;`;
            }
            return preset.url || 'https://example.com';
          };

          const updatePreset = (id, field, value) => {
            setQrPresets(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
          };

          // --- Рендер ---
          const isAnyOverlayActive = Object.values(activeOverlays).some(Boolean);

          return (
            <div className="relative w-screen h-screen bg-black overflow-hidden font-sans select-none text-gray-300">

              {/* Главный контейнер для слоев */}
              <div className="absolute inset-0 z-0 overflow-hidden bg-black">
                {layers.map((layer, index) => {
                  if (!layer.visible) return null;

                  const layerZIndex = { zIndex: index * 10 };

                  if (layer.id === 'media') {
                    return (
                      <div
                        key="layer-media"
                        className="absolute inset-0 flex items-center justify-center cursor-pointer overflow-hidden"
                        style={layerZIndex}
                        onContextMenu={handleContextMenu}
                        onClick={(e) => {
                          // Предотвращаем срабатывание при клике на UI элементы, если они вдруг окажутся внутри
                          if (e.target.closest('button') || e.target.closest('input')) return;

                          // Если клик по самому контейнеру или по медиа-элементам
                          if (e.target === e.currentTarget ||
                              e.target.tagName === 'VIDEO' ||
                              e.target.tagName === 'IMG' ||
                              e.target.classList.contains('animate-in') || // контейнеры анимаций
                              e.target.parentElement?.id === 'layer-media') {
                            setSettingsOpen(!settingsOpen);
                          }
                        }}
                      >
                        {mediaQueue.length > 0 ? (
                          mediaQueue.map((item, idx) => {
                            const isActive = idx === currentIndex;
                            const isExiting = idx === animatingOut;

                            if (!isActive && !isExiting) return null;

                            const isVideo = item.type.startsWith('video/');
                            const animClass = isActive
                              ? `animate-${animationSettings.type}-in`
                              : `animate-${animationSettings.type}-out`;

                            const displayAnimClass = (isActive && !isVideo && animationSettings.displayType !== 'none')
                              ? `animate-${animationSettings.displayType}`
                              : '';

                            const duration = isActive
                              ? animationSettings.inDuration
                              : animationSettings.outDuration;

                            return (
                              <div
                                key={item.id}
                                className={`absolute inset-0 flex items-center justify-center ${animClass}`}
                                style={{ '--anim-duration': `${duration}s` }}
                              >
                                <div className={`w-full h-full flex items-center justify-center ${displayAnimClass}`}>
                                {isVideo ? (
                                  <video
                                    src={item.url}
                                    autoPlay
                                    muted
                                    className="w-full h-full object-contain pointer-events-none"
                                    onEnded={nextMedia}
                                  />
                                ) : (
                                  <img
                                    src={item.url}
                                    className="w-full h-full object-contain pointer-events-none"
                                    alt="media"
                                  />
                                )}
                                </div>
                              </div>
                            );
                          })
                        ) : (
                          <div className="text-gray-600 flex flex-col items-center">
                            <Monitor size={64} className="mb-4 opacity-50" />
                            <p className="text-xl">Холст пуст</p>
                            <p className="text-sm mt-2">Кликните или нажмите 'Q' для настройки</p>
                          </div>
                        )}
                      </div>
                    );
                  }

                  if (layer.id === 'strobe') {
                    return (
                      <div
                        key="layer-strobe"
                        ref={strobeRef}
                        className="absolute inset-0 bg-white pointer-events-none mix-blend-color-dodge transition-opacity duration-75"
                        style={{ ...layerZIndex, opacity: 0 }}
                      />
                    );
                  }

                  if (layer.id === 'effects') {
                    return (
                      <canvas
                        key="layer-effects"
                        ref={canvasRef}
                        className="absolute inset-0 pointer-events-none"
                        style={layerZIndex}
                      />
                    );
                  }

                  if (layer.id === 'qr' || layer.id === 'logo') {
                    const isAnyOverlayActiveLocal = (layer.id === 'qr' && qrPresets.some(p => activeOverlays[p.key])) ||
                                                    (layer.id === 'logo' && activeOverlays['z']);

                    return (

                                     if (p.data.effects) setEffects(p.data.effects);
                                     if (p.data.strobe) setStrobe(p.data.strobe);
                                     if (p.data.logoSettings) setLogoSettings(p.data.logoSettings);
                                     if (p.data.animationSettings) setAnimationSettings(p.data.animationSettings);
                                     alert('Пресет загружен!');
                                   }}
                                   className="p-1.5 bg-blue-600/20 text-blue-400 rounded hover:bg-blue-600/40"
                                 >
                                   <Download size={14} />
                                 </button>
                                 <button
                                   onClick={() => {
                                     const all = loadSavedData('appPresets', []);
                                     const filtered = all.filter((_, idx) => idx !== i);
                                     localStorage.setItem('appPresets', JSON.stringify(filtered));
                                     setActiveTab('presets'); // force re-render
                                   }}
                                   className="p-1.5 bg-red-600/20 text-red-400 rounded hover:bg-red-600/40"
                                 >
                                   <Trash2 size={14} />
                                 </button>
                               </div>
                             </div>
                           ))}
                        </div>

                        <button
                          onClick={() => {
                            const name = prompt('Введите название пресета:');
                            if (name) {
                              const currentPresets = loadSavedData('appPresets', []);
                              const newPreset = {
                                name,
                                data: {
                                  qrPresets,
                                  effects,
                                  strobe,
                                  logoSettings,
                                  animationSettings
                                }
                              };
                              localStorage.setItem('appPresets', JSON.stringify([...currentPresets, newPreset]));
                              setActiveTab('presets');
                            }
                          }}
                          className="w-full py-2 bg-zinc-800 hover:bg-zinc-700 text-white rounded-lg text-sm transition border border-white/5"
                        >
                          Сохранить текущий пресет
                        </button>
                      </div>
                    </div>
                  )}

                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
